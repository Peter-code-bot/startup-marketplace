[build]
  command = "pnpm install --frozen-lockfile && pnpm turbo build --filter=web"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9.15.0"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[context.production]
  command = "pnpm install --frozen-lockfile && pnpm turbo build --filter=web"

[context.deploy-preview]
  command = "pnpm install --frozen-lockfile && pnpm turbo build --filter=web"

[context.branch-deploy]
  command = "pnpm install --frozen-lockfile && pnpm turbo build --filter=web"
